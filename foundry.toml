[profile.default]
src = "contracts"
test = "test/fuzz"
out = "forge-out"
libs = ["node_modules", "lib"]
solc_version = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 2
evm_version = "paris"

# Remappings for OpenZeppelin
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
]

# Fuzz testing config
[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0xdeadbeef"

[invariant]
runs = 256
depth = 64
fail_on_revert = false

[profile.default]
src = "contracts"
test = "test"
out = "forge-out"
libs = ["node_modules", "lib"]
solc_version = "0.8.34"
auto_detect_solc = false
via_ir = true
optimizer = true
optimizer_runs = 1000
evm_version = "osaka"

# Gas limit for integration tests (default 2^64 - 1 for unit tests,
# but block gas limit can restrict execution of multi-level game tests)
gas_limit = 30_000_000_000
block_gas_limit = 30_000_000_000

# Read-only filesystem access scoped to ./contracts so structural attestation tests can
# vm.readFile the source (e.g. VrfWireOneShot greps DegenerusAdmin.sol for the single
# gameAdmin.wireVrf( call site). No write access; no path outside ./contracts.
fs_permissions = [{ access = "read", path = "./contracts" }]

# Remappings for OpenZeppelin and forge-std
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "forge-std/=lib/forge-std/src/",
]

# Solidity formatting via `forge fmt`. line_length 120 matches the existing codebase (single-line
# signatures that fit) — VS Code should format .sol with forge fmt, NOT prettier-at-80 (which wraps
# every signature and churns the whole file on save). See .vscode/settings.json.
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

# Fuzz testing config
[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0xdeadbeef"

[invariant]
runs = 256
depth = 128
fail_on_revert = false
shrink_run_limit = 5000
show_metrics = true
dictionary_weight = 80
include_storage = true
include_push_bytes = true

# Fast inner-loop profile: skips via-IR (the bulk of compile time) for LOGIC
# iteration only. Gas numbers shift and via-IR-specific codegen is unexercised,
# so the default profile remains the pre-commit gate. Usage:
#   FOUNDRY_PROFILE=lite forge test --no-match-path 'test/gas/*' --match-path <suite>
[profile.lite]
via_ir = false
optimizer = false

[profile.deep.fuzz]
runs = 10000
max_test_rejects = 131072
seed = "0xdeadbeef"

[profile.deep.invariant]
runs = 1000
depth = 256
fail_on_revert = false
shrink_run_limit = 5000
show_metrics = true
dictionary_weight = 80
include_storage = true
include_push_bytes = true

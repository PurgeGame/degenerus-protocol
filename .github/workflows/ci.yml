name: CI

# Pre-launch hardening gate: build + size-ceiling + tests, plus non-blocking
# static analysis (Slither + Aderyn). Keeps the regression net running on every
# change so nothing silently regresses before the C4A contest.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundry:
    name: Foundry build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install npm deps (OpenZeppelin, etc.)
        run: npm ci || npm install

      - name: forge build
        run: forge build --sizes

      # EIP-170 guard: DegenerusGame runs perpetually near the 24,576-byte
      # ceiling. Fail CI if any deployed contract breaches it.
      - name: Contract size ceiling (EIP-170)
        run: |
          forge build --sizes --json > sizes.json
          python3 - <<'PY'
          import json, sys
          sizes = json.load(open('sizes.json'))
          LIMIT = 24576
          bad = []
          for name, info in sizes.items():
              rt = (info.get('runtime_size') or info.get('size') or 0)
              if isinstance(rt, dict):
                  rt = rt.get('runtime', 0)
              if rt and rt > LIMIT:
                  bad.append((name, rt))
          if bad:
              for n, s in bad:
                  print(f"::error::{n} runtime size {s} > {LIMIT} (EIP-170)")
              sys.exit(1)
          print("All contracts within the 24,576-byte ceiling.")
          PY

      - name: forge test
        run: forge test -vvv

  slither:
    name: Slither (static analysis, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: npm ci || npm install
      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: none
          slither-args: --exclude-informational --exclude-optimization

  aderyn:
    name: Aderyn (static analysis, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: npm ci || npm install
      - name: Install Aderyn
        run: cargo install aderyn || npm install -g @cyfrin/aderyn
      - name: Run Aderyn
        run: aderyn . -o aderyn-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: aderyn-report
          path: aderyn-report.md
